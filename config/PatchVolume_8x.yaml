model:
  seed: 1234
  batch_size: 4
  num_workers: 8

  gpus: 1
  default_root_dir: ./results
  resume_from_checkpoint: 
  max_steps: 1000000
  max_epochs: 10000
  precision: 32

  perceptual_3d: False  
  embedding_dim: 8
  n_codes: 8192
  n_hiddens: 48
  lr: 3e-4
  downsample: [8, 8, 8]
  disc_channels: 32
  disc_layers: 3
  discriminator_iter_start: 20000
  disc_loss_type: hinge
  volume_gan_weight: 2
  l1_weight: 4.0
  gan_feat_weight: 4
  perceptual_weight: 2
  i3d_feat: False
  restart_thres: 1.0
  no_random_restart: False
  norm_type: group
  num_groups: 24
  stage: 1

wandb:
  wandb_project: "3DMedDiffusion"
  wandb_name: "PatchVolume_8x"

dataset:
  _target_: dataset.monai_dataset.MonaiDataset
  data_path: /vol/miltank/projects/ukbb/data/brain/nifti/assessment2
  file_names: [T1/T1_brain.nii.gz, T2_FLAIR/T2_FLAIR_brain.nii.gz]
  sbj_include: null
  sbj_exclude: null
  n_subjects: 10_00
  split: [0.8, 0.1, 0.1]
  patch_size: 64
  image_channels: 1
  imgtype: CT

data:
  train_transforms:
    - _target_: monai.transforms.LoadImaged
      keys: ["image"]
    - _target_: monai.transforms.EnsureChannelFirstd
      keys: ["image"]
    - _target_: monai.transforms.SpatialPadd
      keys: ["image"]
      spatial_size: [160, 176, 144]
      mode: constant
      constant_values: 0
    - _target_: monai.transforms.RandSpatialCropd
      keys: ["image"]
      roi_size: [64, 64, 64]
    - _target_: monai.transforms.ClipIntensityPercentilesd
      keys: ["image"]
      lower: 0.5
      upper: 99.5
    - _target_: monai.transforms.ScaleIntensityd
      keys: ["image"]
      minv: -1
      maxv: 1
    - _target_: monai.transforms.ToTensord
      keys: ["image"]
    - _target_: monai.transforms.EnsureTyped
      keys: ["image"]
      track_meta: False
  eval_transforms:
    - _target_: monai.transforms.LoadImaged
      keys: ["image"]
    - _target_: monai.transforms.EnsureChannelFirstd
      keys: ["image"]
    - _target_: monai.transforms.SpatialPadd
      keys: ["image"]
      spatial_size: [160, 176, 144]
      mode: constant
      constant_values: 0
    - _target_: monai.transforms.CenterSpatialCropd
      keys: ["image"]
      roi_size: [160, 176, 144]
    - _target_: monai.transforms.ClipIntensityPercentilesd
      keys: ["image"]
      lower: 0.5
      upper: 99.5
    - _target_: monai.transforms.ScaleIntensityd
      keys: ["image"]
      minv: -1
      maxv: 1
    - _target_: monai.transforms.ToTensord
      keys: ["image"]
    - _target_: monai.transforms.EnsureTyped
      keys: ["image"]
      track_meta: False